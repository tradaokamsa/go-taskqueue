version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    shadow: true
  goimports:
    local-prefixes: github.com/tradaokamsa/go-taskqueue

issues:
  exclude-rules:
    - path: ".*_test\\.go"
      linters:
        - errcheck
