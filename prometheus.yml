global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "taskqueue-api"
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: "taskqueue-worker"
    static_configs:
      - targets: ["host.docker.internal:9090"]